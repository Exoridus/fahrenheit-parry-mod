name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  NATIVE_PLATFORM_TOOLSET: "v143"

jobs:
  release:
    name: Release Build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache vcpkg archives
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~\AppData\Local\vcpkg\archives
          key: windows-vcpkg-${{ hashFiles('fahrenheit.release.ref', 'build.proj') }}
          restore-keys: |
            windows-vcpkg-

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2

      - name: Bootstrap and integrate vcpkg
        shell: cmd
        run: |
          if "%VCPKG_INSTALLATION_ROOT%"=="" (
            echo ERROR: VCPKG_INSTALLATION_ROOT is not set on this runner.
            exit /B 1
          )
          pushd "%VCPKG_INSTALLATION_ROOT%"
          call bootstrap-vcpkg.bat -disableMetrics
          if errorlevel 1 exit /B 1
          call vcpkg integrate install
          if errorlevel 1 exit /B 1
          popd

      - name: Full release build
        shell: cmd
        run: build.cmd build --payload full --config Release --repo "${{ github.repository }}" --toolset "${{ env.NATIVE_PLATFORM_TOOLSET }}"

      - name: Package release archives
        shell: cmd
        run: build.cmd release-pack --tag "${{ github.ref_name }}" --deploydir ".workspace\fahrenheit\artifacts\deploy\rel" --outdir ".release"

      - name: Validate release asset sizes
        shell: pwsh
        env:
          MAX_FULL_ZIP_MB: "200"
          MAX_MOD_ZIP_MB: "64"
        run: |
          $full = ".release/fahrenheit-full-${{ github.ref_name }}.zip"
          $mod = ".release/fhparry-mod-${{ github.ref_name }}.zip"
          if (!(Test-Path $full)) { throw "Missing release asset: $full" }
          if (!(Test-Path $mod)) { throw "Missing release asset: $mod" }

          $fullBytes = (Get-Item $full).Length
          $modBytes = (Get-Item $mod).Length
          $fullMax = [int]$env:MAX_FULL_ZIP_MB * 1MB
          $modMax = [int]$env:MAX_MOD_ZIP_MB * 1MB

          if ($fullBytes -gt $fullMax) {
            throw "Full asset too large: $([math]::Round($fullBytes / 1MB, 2)) MB > $env:MAX_FULL_ZIP_MB MB"
          }
          if ($modBytes -gt $modMax) {
            throw "Mod asset too large: $([math]::Round($modBytes / 1MB, 2)) MB > $env:MAX_MOD_ZIP_MB MB"
          }

          Write-Host "Asset size check passed. full=$([math]::Round($fullBytes / 1MB, 2))MB mod=$([math]::Round($modBytes / 1MB, 2))MB"

      - name: Generate release notes
        shell: cmd
        run: build.cmd release-notes --tag "${{ github.ref_name }}" --repo "${{ github.repository }}" --out ".release\release-notes.txt"

      - name: Upload release assets
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: .release/release-notes.txt
          files: |
            .release/fahrenheit-full-${{ github.ref_name }}.zip
            .release/fhparry-mod-${{ github.ref_name }}.zip
            .release/fahrenheit-full-${{ github.ref_name }}.zip.sha256
            .release/fhparry-mod-${{ github.ref_name }}.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

