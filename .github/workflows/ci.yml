name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  verify:
    name: Verify (${{ matrix.config }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Validate commit messages (PR)
        if: github.event_name == 'pull_request' && matrix.config == 'Debug'
        shell: cmd
        run: build.cmd commitrange --range "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Verify
        shell: cmd
        run: build.cmd verify --config ${{ matrix.config }} --repo "${{ github.repository }}"

      - name: Upload debug deploy output (PR)
        if: github.event_name == 'pull_request' && matrix.config == 'Debug'
        uses: actions/upload-artifact@v6
        with:
          name: deploy-dbg-${{ github.event.pull_request.number }}
          path: .workspace/fahrenheit/artifacts/deploy/dbg
          if-no-files-found: warn
